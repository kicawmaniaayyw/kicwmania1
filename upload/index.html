
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Upload Gambar</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #0f0f0f;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: #1b1b1b;
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 0 20px rgba(0,0,0,0.4);
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      font-size: 24px;
    }

    .upload-box {
      border: 2px dashed #444;
      border-radius: 16px;
      padding: 30px 15px;
      text-align: center;
      margin-bottom: 20px;
    }

    input[type=file] {
      display: none;
    }

    .upload-btn {
      background: #4f46e5;
      padding: 14px 20px;
      border-radius: 12px;
      display: inline-block;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
    }

    .upload-btn:hover {
      opacity: 0.9;
    }

    .preview {
      width: 100%;
      margin-top: 15px;
      border-radius: 14px;
      display: none;
    }

    .progress {
      width: 100%;
      height: 10px;
      background: #333;
      border-radius: 10px;
      overflow: hidden;
      margin-top: 15px;
      display: none;
    }

    .progress-bar {
      width: 0%;
      height: 100%;
      background: #4f46e5;
    }

    .result {
      margin-top: 20px;
      display: none;
    }

    textarea {
      width: 100%;
      background: #111;
      color: white;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 12px;
      resize: none;
      height: 100px;
    }

    .copy-btn {
      width: 100%;
      margin-top: 12px;
      border: none;
      background: #22c55e;
      color: white;
      padding: 14px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    .copy-btn:hover {
      opacity: 0.9;
    }

    .status {
      text-align: center;
      margin-top: 12px;
      color: #aaa;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Upload Gambar</h1>

    <div class="upload-box">
      <label class="upload-btn" for="fileInput">
        Pilih Gambar
      </label>

      <input type="file" id="fileInput" accept="image/*" />

      <img id="preview" class="preview" />

      <div class="progress" id="progress">
        <div class="progress-bar" id="progressBar"></div>
      </div>

      <div class="status" id="status"></div>
    </div>

    <div class="result" id="result">
      <textarea id="imageLink" readonly></textarea>

      <button class="copy-btn" id="copyBtn">
        Salin Link
      </button>
    </div>
  </div>

  <script>

    // =============================
    // GANTI DENGAN CLOUDINARY KAMU
    // =============================

    const CLOUD_NAME = "djxlbemky";
    const UPLOAD_PRESET = "uploadgambar";

    // =============================

    const fileInput = document.getElementById('fileInput');
    const preview = document.getElementById('preview');
    const progress = document.getElementById('progress');
    const progressBar = document.getElementById('progressBar');
    const statusText = document.getElementById('status');
    const result = document.getElementById('result');
    const imageLink = document.getElementById('imageLink');
    const copyBtn = document.getElementById('copyBtn');

    fileInput.addEventListener('change', async () => {

      const file = fileInput.files[0];

      if (!file) return;

      // preview gambar
      preview.src = URL.createObjectURL(file);
      preview.style.display = 'block';

      progress.style.display = 'block';
      statusText.innerText = 'Sedang upload...';

      const formData = new FormData();
      formData.append('file', file);
      formData.append('upload_preset', UPLOAD_PRESET);

      try {

        const xhr = new XMLHttpRequest();

        xhr.open(
          'POST',
          `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`
        );

        // progress upload
        xhr.upload.addEventListener('progress', (e) => {
          if (e.lengthComputable) {
            const percent = (e.loaded / e.total) * 100;
            progressBar.style.width = percent + '%';
          }
        });

        xhr.onload = async () => {

          const data = JSON.parse(xhr.responseText);

          if (data.secure_url) {

            imageLink.value = data.secure_url;
            result.style.display = 'block';

            statusText.innerText = 'Upload berhasil';

            // auto copy
            await navigator.clipboard.writeText(data.secure_url);

            copyBtn.innerText = 'Link Tersalin';

          } else {
            statusText.innerText = 'Upload gagal';
          }
        };

        xhr.onerror = () => {
          statusText.innerText = 'Terjadi error';
        };

        xhr.send(formData);

      } catch (err) {
        console.log(err);
        statusText.innerText = 'Upload gagal';
      }
    });

    // tombol copy manual
    copyBtn.addEventListener('click', async () => {

      await navigator.clipboard.writeText(imageLink.value);

      copyBtn.innerText = 'Link Tersalin';

      setTimeout(() => {
        copyBtn.innerText = 'Salin Link';
      }, 2000);

    });

  </script>

</body>
</html>

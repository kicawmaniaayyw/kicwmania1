<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Upload Gambar Ktp</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#d1d1d1;
color:rgb(255, 255, 255);
padding:20px;
display:flex;
flex-direction:column;
align-items:center;
min-height:100vh;
}

.card{
width:100%;
max-width:500px;
background:#fcfcfc;
border-radius:20px;
padding:20px;
box-shadow:0 0 20px rgba(0,0,0,0.4);
}

h1{
text-align:center;
margin-bottom:20px;
color: #313131;
}

.upload-btn{
display:block;
background:#4f46e5;
padding:15px;
text-align:center;
border-radius:12px;
font-weight:bold;
cursor:pointer;
margin-bottom:20px;
}


.upload-btn:active{
background:#312e81;
transform:scale(0.98);
}

input[type=file]{
display:none;
}

.status{
text-align:center;
margin-bottom:15px;
color:#aaa;
}

.image-item{
background:#ffffff;
padding:15px;
border-radius:16px;
margin-bottom:20px;
border:1px solid #333;
}

.preview{
width:100%;
border-radius:12px;
margin-bottom:12px;
}

.link-box{
width:100%;
background:#0f0f0f;
border:1px solid #333;
color:white;
padding:10px;
border-radius:10px;
word-break:break-all;
font-size:13px;
margin-bottom:10px;
}

.copy-btn{
width:100%;
border:none;
background:#00a25e;
color:white;
padding:12px;
border-radius:10px;
font-weight:bold;
cursor:pointer;
margin-top:5px;
}

.copy-all{
width:100%;
border:none;
background:#eab308;
color:black;
padding:15px;
border-radius:12px;
font-weight:bold;
cursor:pointer;
font-size:16px;
margin-top:10px;
}


.copy-all:active{
transform:scale(0.98);
}

.copy-all.active{
background:#6b7280 !important;
color:white;
}

.progress{
width:100%;
height:8px;
background:#333;
border-radius:10px;
overflow:hidden;
margin-top:10px;
display:none;
}

.progress-bar{
height:100%;
width:0%;
background:#4f46e5;
}












.custom-alert{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
justify-content:center;
align-items:center;
z-index:9999;
padding:20px;
}

.alert-box{
background:#ffffff;
width:100%;
max-width:320px;
border-radius:20px;
padding:25px;
text-align:center;
border:1px solid #333;
animation:pop .2s ease;
}

@keyframes pop{
from{
transform:scale(.8);
opacity:0;
}
to{
transform:scale(1);
opacity:1;
}
}

.alert-logo{
width:70px;
height:70px;
object-fit:contain;
margin-bottom:15px;
border-radius: 15px;
}

.alert-text{
font-size:16px;
line-height:1.5;
margin-bottom:20px;
color:rgb(0, 0, 0);
}

#closeAlert{
width:100%;
border:none;
background:#666;
color:white;
padding:13px;
border-radius:12px;
font-weight:bold;
font-size:15px;
cursor:pointer;
}





.loader-box{
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
padding:20px 0;
}

.loader{
width:55px;
height:55px;
border:5px solid #333;
border-top:5px solid #4f46e5;
border-radius:50%;
animation:spin 1s linear infinite;
}

.loading-text{
margin-top:15px;
font-size:14px;
color:#aaa;
}

@keyframes spin{
0%{
transform:rotate(0deg);
}
100%{
transform:rotate(360deg);
}
}







.close-page{
width:100%;
border:none;
background:#ef4444;
color:white;
padding:15px;
border-radius:12px;
font-weight:bold;
font-size:16px;
cursor:pointer;
margin-top:10px;
display:none; /* ⬅️ ini penting */
}








.footer{
margin-top:auto;
width:100%;
max-width:500px;
padding:20px 10px;
text-align:center;
color:#666;
font-size:13px;
}

.footer-content{
background:#cdcdcd;
border-radius:16px;
padding:18px;
}

.footer-title{
font-size:14px;
font-weight:600;
color:#111;
margin-bottom:6px;
}

.footer-title span{
color:#4f46e5;
font-weight:700;
}

.footer-sub{
font-size:12px;
color:#777;
margin-bottom:8px;
}

.footer-dev{
font-size:12px;
color:#888;
}

.footer-dev span{
color:#000;
font-weight:600;
}


.footer-logo{
width:30px;
height:30px;
object-fit:contain;
margin-bottom:10px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}


</style>
</head>
<body>

<div class="card">

<h1>Upload Gambar</h1>

<label class="upload-btn" for="fileInput">

Pilih 2 Gambar Sekaligus
</label>

<input 
type="file" 
id="fileInput" 
accept="image/*"
multiple
/>

<div class="status" id="status"></div>

<div class="loader-box" id="progress">

<div class="loader"></div>

<div class="loading-text">
Sedang upload...
</div>

</div>

<div id="resultContainer"></div>

<button class="copy-all" id="copyAllBtn" style="display:none;">
Salin Semua Link
</button>
<button class="close-page" id="closePageBtn">
  Close
</button>

<button class="copy-all" id="copyAllBtn" style="display:none;"></button>
</div>






<div class="custom-alert" id="customAlert">

  <div class="alert-box">

    <img 
      src="logo-preview.png" 
      class="alert-logo"
    >

    <div class="alert-text">
      Maksimal 2 gambar yang anda upload
    </div>

    <button id="closeAlert">
      Oke
    </button>

  </div>



















  

</div>

















<script>

// =====================
// CLOUDINARY
// =====================

const CLOUD_NAME = "djxlbemky";
const UPLOAD_PRESET = "uploadgambar";

// =====================

const fileInput = document.getElementById('fileInput');
const statusText = document.getElementById('status');
const resultContainer = document.getElementById('resultContainer');
const copyAllBtn = document.getElementById('copyAllBtn');
const progress = document.getElementById('progress');
const progressBar = document.getElementById('progressBar');

let allLinks = [];

fileInput.addEventListener('change', async () => {

const files = [...fileInput.files];

if(files.length === 0) return;




if(files.length > 2){

document.getElementById('customAlert')
.style.display = 'flex';

return;

}




resultContainer.innerHTML = "";
allLinks = [];

progress.style.display = "flex";


statusText.innerText = "Sedang upload...";

let uploaded = 0;

for(const file of files){

const formData = new FormData();

formData.append('file', file);
formData.append('upload_preset', UPLOAD_PRESET);

try{

const response = await fetch(
`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`,
{
method:'POST',
body:formData
}
);

const data = await response.json();

if(data.secure_url){

uploaded++;



allLinks.push(data.secure_url);

const imageCard = document.createElement('div');
imageCard.className = 'image-item';

imageCard.innerHTML = `
<img src="${data.secure_url}" class="preview">

<div class="link-box">
${data.secure_url}
</div>

<button class="copy-btn">
Salin Link
</button>
`;

const copyBtn = imageCard.querySelector('.copy-btn');

copyBtn.addEventListener('click', async () => {

await navigator.clipboard.writeText(data.secure_url);

copyBtn.innerText = "Tersalin";
copyBtn.style.background = "#666";

setTimeout(()=>{
copyBtn.innerText = "Salin Link";
copyBtn.style.background = "#22c55e";
},2000);

});

resultContainer.appendChild(imageCard);

}

}catch(err){
console.log(err);
}

}

statusText.innerText = "Upload selesai";
progress.style.display = "none";

if(allLinks.length === 2){
  copyAllBtn.style.display = "block";
} else {
  copyAllBtn.style.display = "none";
}

document.getElementById('closePageBtn').style.display = "block";

// auto copy semua
await navigator.clipboard.writeText(allLinks.join('\n'));

copyAllBtn.innerText = "Semua Link Tersalin";

});

// tombol copy semua
copyAllBtn.addEventListener('click', async ()=>{

await navigator.clipboard.writeText(allLinks.join('\n'));

// ubah jadi aktif (abu-abu)
copyAllBtn.classList.add('active');

copyAllBtn.innerText = "Semua Link Tersalin";

setTimeout(()=>{
copyAllBtn.innerText = "Salin Semua Link";
copyAllBtn.classList.remove('active');
},2000);

});






document.getElementById('closePageBtn')
.addEventListener('click', () => {
  location.reload();
});



document
.getElementById('closeAlert')
.addEventListener('click',()=>{

document.getElementById('customAlert')
.style.display = 'none';

});
</script>










<footer class="footer">
  <div class="footer-content">

    <img src="logo-preview.png" class="footer-logo">

    <div class="footer-title">
      © 2026 <span>Rupiah Segar</span>
    </div>

    <div class="footer-sub">
      All Rights Reserved
    </div>

    <div class="footer-dev">
      Developed by <span>Pt.digitalind</span>
    </div>

  </div>
</footer>

</body>
</html>
